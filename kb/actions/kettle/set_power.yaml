# Set Power Action for Electric Kettle
#
# This action controls the kettle's power switch using the new structured format.
# The readable structure makes it easy to understand parameter validation
# and effects without parsing complex DSL expressions.
#
# Behavior:
# - Sets power switch to the requested position (on/off)
# - When powered on, heating will begin (handled by environment rules in Phase 4)
# - No immediate temperature change (realistic delay)

action: set_power
object_type: kettle

parameters:
  # Target power state
  to:
    space: ["off", "on"]      # Must be valid power state

structured_preconditions:
  parameter_validation:
    - parameter: to
      must_be_in: ["off", "on"]
      description: "Power can only be set to off or on"
  
  # Note: Future versions might add safety checks in logic_constraints:
  # logic_constraints:
  #   - if: 'to == "on"'
  #     then: 'water_level != "empty"'
  #     description: "Don't heat empty kettle for safety"

structured_effects:
  assignments:
    - component: power
      value: to
      description: "Set power switch to requested state"
  
  # Note: Temperature changes will be handled by environment rules
  # in Phase 4, which will gradually increase temperature when
  # power is on and water is present.