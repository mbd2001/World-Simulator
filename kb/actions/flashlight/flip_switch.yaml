# Flip Switch Action for Flashlight
#
# This action toggles the flashlight's switch to a specified position.
# The new structured format makes preconditions and effects much more readable
# and easier to understand for humans authoring knowledge bases.
#
# Behavior:
# - Sets switch to the requested position (on/off)
# - Bulb follows switch state automatically
# - Battery starts draining when light turns on
# - Prevents turning on if battery is empty (safety check)

action: flip_switch
object_type: flashlight

parameters:
  # Target switch position
  to:
    space: ["off", "on"]      # Must be valid switch position

structured_preconditions:
  parameter_validation:
    - parameter: to
      must_be_in: ["off", "on"]
      description: "Switch can only be set to off or on"
  
  logic_constraints:
    - if: 'to == "on"'
      then: 'battery_level != "empty"'
      description: "Cannot turn on flashlight with empty battery"

structured_effects:
  assignments:
    - component: switch
      value: to
      description: "Set switch to requested position"
    
    - component: bulb
      value: '"on" if switch == "on" else "off"'
      description: "Bulb follows switch state automatically"
  
  trends:
    - component: battery_level
      trend: down
      condition: 'switch == "on"'
      description: "Battery drains when light is on"